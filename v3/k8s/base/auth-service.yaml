apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: finops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: finops-sa
      containers:
      - name: auth
        image: gcr.io/PROJECT_ID/finops-auth-service:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: finops-config
        - secretRef:
            name: finops-secrets
        env:
        - name: PORT
          value: "3001"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: finops
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
  - port: 3001
    targetPort: 3001
