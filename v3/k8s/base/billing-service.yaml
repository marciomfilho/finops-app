apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: finops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      serviceAccountName: finops-sa
      containers:
      - name: billing
        image: gcr.io/PROJECT_ID/finops-billing-service:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: finops-config
        - secretRef:
            name: finops-secrets
        env:
        - name: PORT
          value: "3002"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: finops
spec:
  type: ClusterIP
  selector:
    app: billing-service
  ports:
  - port: 3002
    targetPort: 3002
