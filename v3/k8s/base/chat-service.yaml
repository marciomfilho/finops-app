apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: finops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      serviceAccountName: finops-sa
      containers:
      - name: chat
        image: gcr.io/PROJECT_ID/finops-chat-service:latest
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: finops-config
        - secretRef:
            name: finops-secrets
        env:
        - name: PORT
          value: "3003"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: finops
spec:
  type: ClusterIP
  selector:
    app: chat-service
  ports:
  - port: 3003
    targetPort: 3003
