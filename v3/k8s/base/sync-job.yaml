apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-job
  namespace: finops
spec:
  schedule: "0 2 * * *"   # Diário às 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: finops-sa
          restartPolicy: OnFailure
          containers:
          - name: sync
            image: gcr.io/PROJECT_ID/finops-sync-job:latest
            envFrom:
            - configMapRef:
                name: finops-config
            - secretRef:
                name: finops-secrets
            resources:
              requests:
                cpu: 200m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 512Mi
